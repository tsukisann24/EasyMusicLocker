services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: unless-stopped
    # user: 1000:1000 # Rancher Desktop環境ではパーミッションエラーの原因になるためコメントアウト
    ports:
      - "0.0.0.0:${NAVIDROME_PORT}:4533"  # Navidromeのポート
    volumes:
      - "${MUSIC_FOLDER}:/music:ro"  # 音楽フォルダ（読み取り専用）
      - "${DATA_FOLDER}:/data"  # 設定・再生履歴・プレイリストの保存先
    environment:
      - ND_SCANINTERVAL=1h  # 音楽の再スキャン間隔
      - ND_LOGLEVEL=debug
      - ND_SESSIONTIMEOUT=24h
      - ND_MUSICFOLDER=/music
      - ND_BASEURL=

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: music-locker-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - "${MUSIC_FOLDER}:/music"
    environment:
      - MUSIC_FOLDER_INTERNAL=/music
    depends_on:
      - navidrome
